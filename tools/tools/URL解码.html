<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>URL 解码</title>
    <style>
        :root {
            --bg-primary: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --text-primary: #2c3e50;
            --text-secondary: #5a6c7d;
            --text-muted: #8b9dc3;
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success: #4ecdc4;
            --danger: #fc5c65;
            --warning: #f7b731;
            --border-radius: 20px;
            --border-radius-sm: 14px;
            --border-radius-xs: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: pageLoad 0.8s ease;
        }

        @keyframes pageLoad {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Header ── */
        header {
            width: 100%;
            max-width: 680px;
            text-align: center;
            padding: 28px 24px 22px;
            background: var(--bg-primary);
            border-radius: var(--border-radius);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            animation: headerSlide 0.8s ease 0.2s both;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: headerShine 4s ease-in-out infinite;
        }

        @keyframes headerSlide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes headerShine {
            0% {
                left: -100%;
            }
            50% {
                left: 100%;
            }
            100% {
                left: 100%;
            }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from {
                filter: brightness(1);
            }
            to {
                filter: brightness(1.15);
            }
        }

        .subtitle {
            font-size: 0.88rem;
            color: var(--text-secondary);
            font-weight: 500;
            line-height: 1.5;
        }

        /* ── 主布局 ── */
        .main {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: contentSlide 0.8s ease 0.4s both;
        }

        @keyframes contentSlide {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--bg-primary);
            border-radius: var(--border-radius);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            padding: 22px 20px;
        }

        .card-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        /* ── 文本域 ── */
        .textarea {
            width: 100%;
            min-height: 130px;
            padding: 14px;
            background: var(--bg-primary);
            border: none;
            border-radius: var(--border-radius-xs);
            color: var(--text-primary);
            font-size: 0.8rem;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            outline: none;
            resize: vertical;
            transition: var(--transition);
            line-height: 1.5;
        }

        .textarea:focus {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light), 0 0 0 2px rgba(102, 126, 234, 0.2);
        }

        .textarea::placeholder {
            color: var(--text-muted);
            font-style: italic;
            opacity: 0.8;
        }

        /* ── 选项行 ── */
        .option-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            margin: 14px 0;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }

        .radio-group {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: 500;
        }

        .radio-group input[type="radio"] {
            accent-color: var(--accent-primary);
            width: 16px;
            height: 16px;
        }

        /* ── 状态栏 ── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--bg-primary);
            border-radius: var(--border-radius-xs);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            margin-top: 14px;
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            min-height: 42px;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-dot.ready {
            background: var(--text-muted);
        }

        .status-dot.ok {
            background: var(--success);
            animation: dotPulse 2s infinite;
        }

        .status-dot.loading {
            background: var(--warning);
            animation: dotPulse 1s infinite;
        }

        .status-dot.error {
            background: var(--danger);
        }

        @keyframes dotPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        /* ── 按钮行 ── */
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 0;
            padding: 12px 10px;
            border: none;
            border-radius: var(--border-radius-xs);
            background: var(--bg-primary);
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            transform: scale(0.97);
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .btn.primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 4px 4px 10px rgba(102, 126, 234, 0.35), -2px -2px 6px var(--shadow-light);
        }

        .btn.primary:hover {
            box-shadow: 5px 5px 14px rgba(102, 126, 234, 0.45);
        }

        .btn.primary:active {
            box-shadow: inset 3px 3px 8px rgba(50, 50, 150, 0.4), inset -2px -2px 6px rgba(255, 255, 255, 0.2);
        }

        .btn.success {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: #fff;
            box-shadow: 4px 4px 10px rgba(78, 205, 196, 0.35), -2px -2px 6px var(--shadow-light);
        }

        .btn.danger {
            color: var(--danger);
        }

        /* ── 说明列表 ── */
        .instr-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .instr-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: var(--bg-primary);
            border-radius: var(--border-radius-xs);
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
        }

        .instr-icon {
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .instr-text {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .instr-text strong {
            color: var(--text-primary);
            font-weight: 700;
        }

        /* ── 响应式 ── */
        @media (max-width: 420px) {
            h1 {
                font-size: 1.8rem;
            }
            .option-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>URL 解码</h1>
        <p class="subtitle">将百分号编码的URL还原为可读文本 · 支持自动检测解码</p>
    </header>

    <div class="main">
        <!-- 解码功能卡片 -->
        <div class="card">
            <div class="card-label">🔓 URL 解码</div>

            <textarea class="textarea" id="decodeInput" placeholder="输入需要解码的URL编码字符串，例如：https%3A%2F%2Fexample.com%3Fname%3D%E5%BC%A0%E4%B8%89%26age%3D28"></textarea>

            <div class="option-row">
                <span>解码方式：</span>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="decodeMode" value="auto" checked> 自动检测 (推荐)
                    </label>
                    <label>
                        <input type="radio" name="decodeMode" value="decodeURIComponent"> URI 组件解码
                    </label>
                </div>
            </div>

            <div class="status-bar" id="decodeStatus">
                <div class="status-dot ready" id="decodeDot"></div>
                <span id="decodeStatusText">就绪，输入编码字符串后点击解码</span>
            </div>

            <div class="btn-row">
                <button class="btn primary" id="decodeBtn">🔄 开始解码</button>
                <button class="btn success" id="copyDecodedBtn" disabled>📋 复制结果</button>
                <button class="btn danger" id="clearDecodeBtn">🗑️ 清空</button>
            </div>

            <textarea class="textarea" id="decodeOutput" placeholder="解码结果将显示在这里…" readonly style="margin-top: 14px;"></textarea>
        </div>

        <!-- 使用说明 -->
        <div class="card">
            <div class="card-label">📖 使用说明</div>
            <div class="instr-list">
                <div class="instr-item">
                    <span class="instr-icon">🔓</span>
                    <div class="instr-text"><strong>解码模式</strong>：将百分号编码（如 <code>%E5%BC%A0</code>）还原为原始字符。推荐使用「自动检测」，工具会依次尝试 <code>decodeURIComponent</code> 和 <code>decodeURI</code> 并选择成功的结果</div>
                </div>
                <div class="instr-item">
                    <span class="instr-icon">⚙️</span>
                    <div class="instr-text"><strong>使用场景</strong>：当您拿到被编码的URL字符串（例如从分享链接、API响应中获取的），需要查看原始内容时使用</div>
                </div>
                <div class="instr-item">
                    <span class="instr-icon">📋</span>
                    <div class="instr-text"><strong>一键复制</strong>：解码成功后，点击复制按钮即可将还原的文本放入剪贴板</div>
                </div>
                <div class="instr-item">
                    <span class="instr-icon">🔒</span>
                    <div class="instr-text"><strong>隐私安全</strong>：所有解码转换完全在您的浏览器本地进行，不会向服务器发送任何数据</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ── DOM 引用 ──
            const decodeInput = document.getElementById('decodeInput');
            const decodeOutput = document.getElementById('decodeOutput');
            const decodeBtn = document.getElementById('decodeBtn');
            const copyDecodedBtn = document.getElementById('copyDecodedBtn');
            const clearDecodeBtn = document.getElementById('clearDecodeBtn');
            const decodeDot = document.getElementById('decodeDot');
            const decodeStatusText = document.getElementById('decodeStatusText');
            const decodeModeRadios = document.getElementsByName('decodeMode');

            // ── 状态显示辅助 ──
            function setStatus(dot, textEl, msg, type) {
                textEl.textContent = msg;
                dot.className = 'status-dot ' + (type || 'ready');
            }

            // ── 获取选中的解码模式 ──
            function getDecodeMode() {
                for (let radio of decodeModeRadios) {
                    if (radio.checked) return radio.value;
                }
                return 'auto';
            }

            // ── 解码操作 ──
            decodeBtn.addEventListener('click', () => {
                const raw = decodeInput.value.trim();
                if (!raw) {
                    setStatus(decodeDot, decodeStatusText, '请输入需要解码的URL编码字符串', 'error');
                    return;
                }
                setStatus(decodeDot, decodeStatusText, '正在解码…', 'loading');
                try {
                    const mode = getDecodeMode();
                    let result = '';
                    let success = false;

                    if (mode === 'auto') {
                        // 尝试 decodeURIComponent，如果失败则尝试 decodeURI
                        try {
                            result = decodeURIComponent(raw);
                            success = true;
                        } catch (e1) {
                            try {
                                result = decodeURI(raw);
                                success = true;
                            } catch (e2) {
                                // 两者都失败
                            }
                        }
                        if (!success) {
                            throw new Error('无法解码，请检查字符串是否为有效的URL编码格式');
                        }
                    } else if (mode === 'decodeURIComponent') {
                        result = decodeURIComponent(raw);
                    } else {
                        result = decodeURI(raw);
                    }

                    decodeOutput.value = result;
                    copyDecodedBtn.disabled = false;
                    setStatus(decodeDot, decodeStatusText, '解码成功，结果已生成', 'ok');
                } catch (e) {
                    setStatus(decodeDot, decodeStatusText, '解码失败：' + e.message, 'error');
                    copyDecodedBtn.disabled = true;
                    decodeOutput.value = '';
                }
            });

            // ── 复制结果 ──
            copyDecodedBtn.addEventListener('click', async () => {
                if (!decodeOutput.value) return;
                try {
                    await navigator.clipboard.writeText(decodeOutput.value);
                    setStatus(decodeDot, decodeStatusText, '解码结果已复制到剪贴板 📋', 'ok');
                } catch (err) {
                    const ta = document.createElement('textarea');
                    ta.value = decodeOutput.value;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    setStatus(decodeDot, decodeStatusText, '已复制（备用方式）', 'ok');
                }
            });

            // ── 清空按钮 ──
            clearDecodeBtn.addEventListener('click', () => {
                decodeInput.value = '';
                decodeOutput.value = '';
                copyDecodedBtn.disabled = true;
                setStatus(decodeDot, decodeStatusText, '已清空，输入编码字符串后点击解码', 'ready');
                // 恢复默认解码模式
                decodeModeRadios[0].checked = true;
            });

            // ── 初始化状态 ──
            setStatus(decodeDot, decodeStatusText, '就绪，输入编码字符串后点击解码', 'ready');
        })();
    </script>
</body>
</html>
