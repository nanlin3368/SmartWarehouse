<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP 信息查询</title>
    <style>
      :root {
        --bg-primary: #e0e5ec;
        --bg-secondary: #f0f4f8;
        --shadow-light: #ffffff;
        --shadow-dark: #a3b1c6;
        --text-primary: #2c3e50;
        --text-secondary: #5a6c7d;
        --text-muted: #8b9dc3;
        --accent-primary: #667eea;
        --accent-secondary: #764ba2;
        --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --success: #4ecdc4;
        --danger: #fc5c65;
        --border-radius: 20px;
        --border-radius-sm: 14px;
        --border-radius-xs: 10px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
        -webkit-tap-highlight-color: transparent; /* 全局禁用点击高亮 */
      }

      body {
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        animation: pageLoad 0.8s ease;
      }

      @keyframes pageLoad {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── 顶部 header ── */
      header {
        width: 100%;
        max-width: 700px;
        text-align: center;
        padding: 28px 24px 22px;
        background: var(--bg-primary);
        border-radius: var(--border-radius);
        box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        margin-bottom: 24px;
        position: relative;
        overflow: hidden;
        animation: headerSlide 0.8s ease 0.2s both;
      }

      header::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        animation: headerShine 4s ease-in-out infinite;
      }

      @keyframes headerSlide {
        from { opacity: 0; transform: translateY(-20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes headerShine {
        0%   { left: -100%; }
        50%  { left: 100%; }
        100% { left: 100%; }
      }
        to   { transform: translateY(-4px); }

      h1 {
        font-size: 2.2rem;
        font-weight: 700;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
        animation: titleGlow 3s ease-in-out infinite alternate;
      }

      @keyframes titleGlow {
        from { filter: brightness(1); }
        to   { filter: brightness(1.15); }
      }

      .subtitle {
        font-size: 0.92rem;
        color: var(--text-secondary);
        font-weight: 500;
      }

      /* ── 主内容区 ── */
      .main {
        width: 100%;
        max-width: 700px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        animation: contentSlide 0.8s ease 0.4s both;
      }

      @keyframes contentSlide {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── 通用卡片 ── */
      .card {
        background: var(--bg-primary);
        border-radius: var(--border-radius);
        box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        padding: 22px 20px;
      }

      /* ── 查询输入卡片 ── */
      .query-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 12px;
      }

      .query-row {
        display: flex;
        gap: 10px;
      }

      .query-input {
        flex: 1;
        padding: 13px 16px;
        background: var(--bg-primary);
        border: none;
        border-radius: var(--border-radius-xs);
        color: var(--text-primary);
        font-size: 1rem;
        font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
        box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        outline: none;
        transition: var(--transition);
      }

      .query-input:focus {
        box-shadow: inset 6px 6px 12px var(--shadow-dark),
                    inset -6px -6px 12px var(--shadow-light),
                    0 0 0 2.5px rgba(102,126,234,0.25);
      }

      .query-input::placeholder { color: var(--text-muted); }

      .query-btn {
        padding: 13px 22px;
        background: var(--accent-gradient);
        color: #fff;
        border: none;
        border-radius: var(--border-radius-xs);
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        flex-shrink: 0;
        box-shadow: 4px 4px 10px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
        transition: var(--transition);
        -webkit-tap-highlight-color: transparent;
      }

      .query-btn:hover  { transform: translateY(-2px); box-shadow: 6px 6px 14px var(--shadow-dark); }
      .query-btn:active { transform: scale(0.96); }
      .query-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      /* ── Hero 大卡 ── */
      .hero-card {
        background: var(--accent-gradient);
        border-radius: var(--border-radius);
        padding: 24px 22px 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        position: relative;
        overflow: hidden;
        box-shadow: 6px 6px 20px rgba(102,126,234,0.35), -4px -4px 12px var(--shadow-light);
      }

      .hero-card::before {
        content: '🌐';
        position: absolute;
        right: 18px; top: 14px;
        font-size: 56px;
        opacity: 0.12;
        line-height: 1;
        pointer-events: none;
      }

      .hero-label {
        font-size: 0.72rem;
        font-weight: 700;
        color: rgba(255,255,255,0.7);
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      .hero-addr {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
        letter-spacing: 0.5px;
        word-break: break-all;
        line-height: 1.2;
      }

      .hero-loc {
        font-size: 0.88rem;
        color: rgba(255,255,255,0.82);
        margin-top: 2px;
      }

      .hero-copy {
        align-self: flex-start;
        margin-top: 10px;
        padding: 8px 18px;
        background: rgba(255,255,255,0.2);
        border: none;
        border-radius: var(--border-radius-xs);
        color: #fff;
        font-size: 0.88rem;
        font-weight: 700;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.2s;
      }

      .hero-copy:hover  { background: rgba(255,255,255,0.3); }
      .hero-copy:active { background: rgba(255,255,255,0.38); }

      /* ── 信息列表卡片 ── */
      .info-section-title {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--text-muted);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }

      .info-rows {
        display: flex;
        flex-direction: column;
      }

      .info-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 0;
        border-bottom: 1px solid;
        border-image: linear-gradient(90deg, transparent, var(--shadow-dark), transparent) 1;
        gap: 14px;
      }

      .info-row:last-child { border-bottom: none; }

      .info-key {
        font-size: 0.9rem;
        color: var(--text-secondary);
        flex-shrink: 0;
      }

      .info-val {
        font-size: 0.9rem;
        color: var(--text-primary);
        font-weight: 600;
        text-align: right;
        word-break: break-all;
      }

      .info-val.mono {
        font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
        font-size: 0.82rem;
      }

      /* ── 加载 / 错误状态 ── */
      .status-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 40px 20px;
      }

      .status-icon { font-size: 2.4rem; line-height: 1; }

      .status-text {
        font-size: 0.92rem;
        color: var(--text-secondary);
        text-align: center;
        line-height: 1.6;
      }

      /* ── Spinner ── */
      @keyframes spin { to { transform: rotate(360deg); } }

      .spinner {
        width: 36px; height: 36px;
        border: 3.5px solid var(--shadow-dark);
        border-top-color: var(--accent-primary);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        box-shadow: 2px 2px 6px var(--shadow-dark);
      }

      .retry-btn {
        padding: 10px 26px;
        background: var(--accent-gradient);
        color: #fff;
        border: none;
        border-radius: var(--border-radius-xs);
        font-size: 0.92rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 4px 4px 10px var(--shadow-dark);
        transition: var(--transition);
        -webkit-tap-highlight-color: transparent;
      }

      .retry-btn:hover  { transform: translateY(-2px); }
      .retry-btn:active { transform: scale(0.96); }

      /* ── 响应式 ── */
      @media (max-width: 480px) {
        h1 { font-size: 1.8rem; }
        .hero-addr { font-size: 1.5rem; }
        .card { padding: 18px 16px; }
      }
    </style>
  </head>
  <body>

    <header>
      <h1>IP 信息查询</h1>
      <p class="subtitle">查询 IP 的地理位置与网络信息</p>
    </header>

    <div class="main">

      <!-- 查询输入 -->
      <div class="card" id="queryCard">
        <div class="query-label">查询其他 IP</div>
        <div class="query-row">
          <input class="query-input" id="customInput"
                 placeholder="输入 IP 地址，如 8.8.8.8"
                 type="text" inputmode="decimal" />
          <button class="query-btn" id="queryBtn">查询</button>
        </div>
      </div>

      <!-- Hero：当前/查询 IP -->
      <div id="heroArea">
        <div class="card">
          <div class="status-box">
            <div class="spinner"></div>
            <div class="status-text">正在获取您的 IP…</div>
          </div>
        </div>
      </div>

      <!-- 详情：地理 + 网络 -->
      <div id="detailArea"></div>

    </div>

    <script>

      // ── 查询按钮 / 回车 ────────────────────────────
      const customInput = document.getElementById('customInput')
      const queryBtn    = document.getElementById('queryBtn')

      queryBtn.addEventListener('click', doQuery)
      customInput.addEventListener('keydown', e => { if (e.key === 'Enter') doQuery() })

      // ── Fetch ──────────────────────────────────────
      function normalize(data, src) {
        if (src === 'ip-api') {
          return {
            ip: data.query,
            country_name: data.country,
            country: data.countryCode,
            region: data.regionName,
            city: data.city,
            postal: data.zip,
            timezone: data.timezone,
            latitude: data.lat,
            longitude: data.lon,
            org: data.isp,
            asn: data.as ? data.as.split(' ')[0] : '',
          }
        }
        if (src === 'ipinfo') {
          const [lat, lon] = (data.loc || '').split(',')
          return {
            ip: data.ip,
            country_name: '',
            country: data.country,
            region: data.region,
            city: data.city,
            postal: data.postal,
            timezone: data.timezone,
            latitude: lat || '',
            longitude: lon || '',
            org: data.org,
            asn: data.org ? data.org.split(' ')[0] : '',
          }
        }
        return data
      }

      async function tryFetch(url, timeout = 8000) {
        const ctrl = new AbortController()
        const timer = setTimeout(() => ctrl.abort(), timeout)
        try {
          const res = await fetch(url, { signal: ctrl.signal })
          clearTimeout(timer)
          if (!res.ok) throw new Error('HTTP ' + res.status)
          return await res.json()
        } catch (e) {
          clearTimeout(timer)
          throw e
        }
      }

      async function fetchIP(target) {
        const errors = []

        // API 1: ip.useragentinfo.com（国内稳定，HTTPS，支持指定 IP）
        try {
          const url = target
            ? `https://ip.useragentinfo.com/json?ip=${encodeURIComponent(target)}`
            : `https://ip.useragentinfo.com/json`
          const data = await tryFetch(url)
          if (data.ip) {
            return {
              ip: data.ip,
              country_name: data.country,
              country: data.short_name,
              region: data.province,
              city: data.city,
              postal: '',
              timezone: '',
              latitude: '',
              longitude: '',
              org: data.isp,
              asn: '',
            }
          }
        } catch(e) { errors.push('useragentinfo: ' + e.message) }

        // API 2: ipapi.co（备用）
        try {
          const url = target
            ? `https://ipapi.co/${encodeURIComponent(target)}/json/`
            : `https://ipapi.co/json/`
          const data = await tryFetch(url, 10000)
          if (data.error) throw new Error(data.reason || '查询失败')
          if (data.ip) return normalize(data, 'ipapi')
        } catch(e) { errors.push('ipapi.co: ' + e.message) }

        // API 3: ipinfo.io（最后备用）
        try {
          const url = target
            ? `https://ipinfo.io/${encodeURIComponent(target)}/json`
            : `https://ipinfo.io/json`
          const data = await tryFetch(url, 10000)
          if (data.ip) return normalize(data, 'ipinfo')
        } catch(e) { errors.push('ipinfo: ' + e.message) }

        throw new Error(errors.join(' | '))
      }

      // ── 渲染 Hero ──────────────────────────────────
      function renderHero(data, isCustom) {
        const loc = [data.city, data.region, data.country_name].filter(Boolean).join(' · ')
        document.getElementById('heroArea').innerHTML = `
          <div class="hero-card">
            <div class="hero-label">${isCustom ? '查询的 IP' : '您的当前 IP'}</div>
            <div class="hero-addr" id="heroAddr">${data.ip}</div>
            <div class="hero-loc">${loc || '位置未知'}</div>
            <button class="hero-copy" id="heroCopyBtn">复制 IP</button>
          </div>`
        document.getElementById('heroCopyBtn').addEventListener('click', copyIP)
      }

      // ── 渲染详情 ───────────────────────────────────
      function renderDetail(data) {
        const geoRows = [
          { key: '国家 / 地区', val: [data.country_name, data.country ? `(${data.country})` : ''].filter(Boolean).join(' ') },
          { key: '省 / 州',    val: data.region },
          { key: '城市',       val: data.city },
          { key: '邮政编码',   val: data.postal },
          { key: '时区',       val: data.timezone },
          { key: '经纬度',     val: data.latitude && data.longitude ? `${data.latitude}, ${data.longitude}` : '', mono: true },
        ].filter(r => r.val)

        const netRows = [
          { key: 'ASN',         val: data.asn,  mono: true },
          { key: '运营商 / 组织', val: data.org },
          { key: 'IP 版本',    val: data.ip && data.ip.includes(':') ? 'IPv6' : 'IPv4', mono: true },
        ].filter(r => r.val)

        const makeRows = rows => rows.map(r => `
          <div class="info-row">
            <span class="info-key">${r.key}</span>
            <span class="info-val${r.mono ? ' mono' : ''}">${r.val}</span>
          </div>`).join('')

        document.getElementById('detailArea').innerHTML = `
          <div class="card">
            <div class="info-section-title">地理位置</div>
            <div class="info-rows">${makeRows(geoRows)}</div>
          </div>
          <div class="card" style="margin-top:20px">
            <div class="info-section-title">网络信息</div>
            <div class="info-rows">${makeRows(netRows)}</div>
          </div>`
      }

      // ── 渲染错误 ───────────────────────────────────
      function renderError(msg) {
        document.getElementById('heroArea').innerHTML = `
          <div class="card">
            <div class="status-box">
              <div class="status-icon">😵</div>
              <div class="status-text">${msg}</div>
              <button class="retry-btn" id="retryBtn">重试</button>
            </div>
          </div>`
        document.getElementById('retryBtn').addEventListener('click', loadSelf)
        document.getElementById('detailArea').innerHTML = ''
      }

      // ── 加载 Loading 状态 ──────────────────────────
      function showLoading(text) {
        document.getElementById('heroArea').innerHTML = `
          <div class="card">
            <div class="status-box">
              <div class="spinner"></div>
              <div class="status-text">${text}</div>
            </div>
          </div>`
        document.getElementById('detailArea').innerHTML = ''
      }

      // ── 加载自己 IP ────────────────────────────────
      async function loadSelf() {
        showLoading('正在获取您的 IP…')
        try {
          const data = await fetchIP(null)
          renderHero(data, false)
          renderDetail(data)
        } catch (e) {
          renderError('获取失败，请检查网络后重试')
        }
      }

      // ── 查询指定 IP ────────────────────────────────
      async function doQuery() {
        const val = customInput.value.trim()
        if (!val) { customInput.focus(); return }

        queryBtn.disabled = true
        queryBtn.textContent = '查询中…'
        showLoading(`正在查询 ${val}…`)

        try {
          const data = await fetchIP(val)
          renderHero(data, true)
          renderDetail(data)
        } catch (e) {
          renderError(`查询 ${val} 失败<br>请确认 IP 格式正确并检查网络`)
        } finally {
          queryBtn.disabled = false
          queryBtn.textContent = '查询'
        }
      }

      // ── 复制 IP ────────────────────────────────────
      function copyIP() {
        const addr = document.getElementById('heroAddr')
        const btn  = document.getElementById('heroCopyBtn')
        if (!addr || !btn) return
        const text = addr.textContent
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(fallbackCopy)
        } else {
          fallbackCopy()
        }
        function fallbackCopy() {
          const el = document.createElement('textarea')
          el.value = text
          el.style.cssText = 'position:fixed;opacity:0;pointer-events:none'
          document.body.appendChild(el)
          el.focus(); el.select()
          try { document.execCommand('copy') } catch(e) {}
          document.body.removeChild(el)
        }
        btn.textContent = '已复制 ✓'
        setTimeout(() => { btn.textContent = '复制 IP' }, 1800)
      }

      // ── 启动 ──────────────────────────────────────
      loadSelf()
    </script>

  </body>
</html>
