<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CSS 动画效果</title>
    <style>
        :root {
            --bg-primary: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --text-primary: #2c3e50;
            --text-secondary: #5a6c7d;
            --text-muted: #8b9dc3;
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success: #4ecdc4;
            --danger: #fc5c65;
            --warning: #f7b731;
            --border-radius: 20px;
            --border-radius-sm: 14px;
            --border-radius-xs: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: pageLoad 0.8s ease;
        }

        @keyframes pageLoad {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            width: 100%;
            max-width: 680px;
            text-align: center;
            padding: 28px 24px 22px;
            background: var(--bg-primary);
            border-radius: var(--border-radius);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            animation: headerSlide 0.8s ease 0.2s both;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: headerShine 4s ease-in-out infinite;
        }

        @keyframes headerSlide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes headerShine {
            0% {
                left: -100%;
            }
            50% {
                left: 100%;
            }
            100% {
                left: 100%;
            }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from {
                filter: brightness(1);
            }
            to {
                filter: brightness(1.15);
            }
        }

        .subtitle {
            font-size: 0.92rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .main {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: contentSlide 0.8s ease 0.4s both;
        }

        @keyframes contentSlide {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--bg-primary);
            border-radius: var(--border-radius);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            padding: 22px 20px;
        }

        .card-label {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .category-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .category-chip {
            padding: 5px 14px;
            border: none;
            border-radius: 30px;
            background: var(--bg-primary);
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            user-select: none;
        }

        .category-chip.active {
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            color: var(--accent-primary);
        }

        .category-chip:hover {
            color: var(--accent-primary);
        }

        /* ========== 动画网格：凹陷托盘效果 ========== */
        .anim-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            max-height: 520px;
            overflow-y: auto;
            padding: 16px;
            border-radius: var(--border-radius-xs);
            background: var(--bg-primary);
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        .anim-grid::-webkit-scrollbar {
            width: 4px;
        }

        .anim-grid::-webkit-scrollbar-track {
            background: transparent;
            margin: 10px 0;
        }

        .anim-grid::-webkit-scrollbar-thumb {
            background: var(--shadow-dark);
            border-radius: 4px;
        }

        .anim-card {
            background: var(--bg-primary);
            border-radius: var(--border-radius-xs);
            box-shadow: 5px 5px 10px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            padding: 18px 10px 14px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            user-select: none;
        }

        .anim-card:hover {
            transform: translateY(-3px);
            box-shadow: 8px 8px 16px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
        }

        .anim-card:active {
            transform: scale(0.96);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
        }

        .anim-card.active-card {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            background: rgba(102, 126, 234, 0.08);
        }

        .anim-icon-box {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-primary);
            box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: var(--transition);
        }

        .anim-card.active-card .anim-icon-box {
            animation: previewPulse 0.6s ease-in-out;
        }

        @keyframes previewPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        .anim-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.3;
            word-break: break-word;
        }

        /* ========== 预览舞台：增大尺寸 ========== */
        .preview-stage {
            background: var(--bg-primary);
            border-radius: var(--border-radius-sm);
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            padding: 40px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 260px;
            position: relative;
            overflow: hidden;
        }

        /* ========== 预览色块：改大 ========== */
        .preview-box {
            width: 130px;
            height: 130px;
            border-radius: 20px;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
            transition: box-shadow 0.3s;
            cursor: pointer;
            user-select: none;
            position: relative;
            z-index: 2;
        }

        .preview-box.animating {
            animation-fill-mode: both;
        }

        .preview-hint {
            position: absolute;
            bottom: 14px;
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
            opacity: 0.7;
        }

        .param-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .param-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .param-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .param-label span {
            font-weight: 600;
            color: var(--text-secondary);
        }

        select {
            padding: 8px 10px;
            border: none;
            border-radius: var(--border-radius-xs);
            background: var(--bg-primary);
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            font-size: 0.85rem;
            color: var(--text-primary);
            outline: none;
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--bg-primary);
            box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--bg-primary);
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            cursor: pointer;
            transition: var(--transition);
        }

        .code-block {
            background: var(--bg-primary);
            border-radius: var(--border-radius-xs);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            padding: 14px;
            font-family: 'SF Mono', 'Menlo', 'Courier New', monospace;
            font-size: 0.75rem;
            color: var(--text-primary);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            margin-bottom: 14px;
            max-height: 300px;
            overflow-y: auto;
        }

        .code-block::-webkit-scrollbar {
            width: 3px;
        }

        .code-block::-webkit-scrollbar-thumb {
            background: var(--shadow-dark);
            border-radius: 3px;
        }

        .action-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 80px;
            padding: 11px 8px;
            border: none;
            border-radius: var(--border-radius-xs);
            background: var(--bg-primary);
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            user-select: none;
        }

        .action-btn:active {
            transform: scale(0.97);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
        }

        .action-btn.primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .info-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
        }

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--text-primary);
            color: white;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.82rem;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .instr-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .instr-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 12px;
            background: var(--bg-primary);
            border-radius: var(--border-radius-xs);
            box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
        }

        .instr-icon {
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .instr-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .instr-text strong {
            color: var(--text-primary);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--shadow-dark), transparent);
            margin: 14px 0;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            .anim-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                max-height: 440px;
                padding: 12px;
                border-radius: var(--border-radius-xs);
                box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            }
            .anim-card {
                padding: 14px 8px 10px;
            }
            .anim-icon-box {
                width: 38px;
                height: 38px;
                font-size: 1.1rem;
            }
            .anim-name {
                font-size: 0.75rem;
            }
            .param-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            h1 {
                font-size: 1.6rem;
            }
            .category-chip {
                padding: 5px 11px;
                font-size: 0.68rem;
            }
            .preview-box {
                width: 110px;
                height: 110px;
                border-radius: 18px;
                font-size: 0.9rem;
            }
            .preview-stage {
                min-height: 230px;
                padding: 32px 18px;
            }
        }

        @media (max-width: 380px) {
            .anim-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                padding: 10px;
                border-radius: var(--border-radius-xs);
                box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            }
            h1 {
                font-size: 1.4rem;
            }
            .preview-box {
                width: 96px;
                height: 96px;
                border-radius: 16px;
                font-size: 0.82rem;
            }
            .preview-stage {
                min-height: 200px;
                padding: 28px 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>CSS 动画效果</h1>
        <p class="subtitle">83个动画 · 实时预览 · 一键导出</p>
    </header>

    <div class="main">
        <!-- 分类筛选 -->
        <div class="card">
            <div class="card-label">🎬 动画分类</div>
            <div class="category-row" id="categoryRow">
                <button class="category-chip active" data-category="all">全部(83)</button>
                <button class="category-chip" data-category="bounce">🏀 弹跳(10)</button>
                <button class="category-chip" data-category="fade">👻 淡入淡出(16)</button>
                <button class="category-chip" data-category="flip">🪙 翻转(6)</button>
                <button class="category-chip" data-category="lightSpeed">⚡ 光速(4)</button>
                <button class="category-chip" data-category="rotate">🔄 旋转(8)</button>
                <button class="category-chip" data-category="zoom">🔍 缩放(8)</button>
                <button class="category-chip" data-category="slide">📥 滑动(8)</button>
                <button class="category-chip" data-category="special">✨ 特殊(6)</button>
                <button class="category-chip" data-category="emphasis">💥 强调(12)</button>
                <button class="category-chip" data-category="continuous">🔁 连续(5)</button>
            </div>
        </div>

        <!-- 动画列表 -->
        <div class="card">
            <div class="card-label">🎭 动画列表</div>
            <div class="anim-grid" id="animGrid"></div>
            <div class="divider"></div>
            <div class="info-row">
                <span class="info-dot"></span> 当前选中：<strong id="selectedName">弹跳</strong>
                <span style="margin-left:auto;">显示 <strong id="filteredCount">83</strong> 个动画</span>
            </div>
        </div>

        <!-- 预览 -->
        <div class="card">
            <div class="card-label">👁️ 实时预览</div>
            <div class="preview-stage" id="previewStage">
                <div class="preview-box" id="previewBox">动画</div>
                <span class="preview-hint">👆 点击播放</span>
            </div>
            <div class="action-bar" style="margin-top:14px;">
                <button class="action-btn" id="playBtn">▶ 播放一次</button>
                <button class="action-btn" id="loopBtn">🔁 循环播放</button>
                <button class="action-btn" id="stopBtn">⏹ 停止</button>
            </div>
        </div>

        <!-- 参数调节 -->
        <div class="card">
            <div class="card-label">⚙️ 动画参数</div>
            <div class="param-grid">
                <div class="param-item">
                    <div class="param-label">持续时间 <span id="durationVal">0.6s</span></div>
                    <input type="range" id="duration" min="0.1" max="5" step="0.05" value="0.6">
                </div>
                <div class="param-item">
                    <div class="param-label">延迟 <span id="delayVal">0s</span></div>
                    <input type="range" id="delay" min="0" max="3" step="0.05" value="0">
                </div>
                <div class="param-item">
                    <div class="param-label">重复次数 <span id="iterationVal">1</span></div>
                    <input type="range" id="iteration" min="1" max="10" step="1" value="1">
                </div>
            </div>
        </div>

        <!-- CSS 代码 -->
        <div class="card">
            <div class="card-label">📋 CSS 代码</div>
            <div class="code-block" id="cssCode"></div>
            <div class="action-bar">
                <button class="action-btn primary" id="copyFullBtn">📋 复制完整CSS</button>
                <button class="action-btn" id="copyKeyframesBtn">🎞 仅复制关键帧</button>
                <button class="action-btn" id="copyClassBtn">📝 仅复制类名</button>
            </div>
        </div>

        <!-- 使用说明 -->
        <div class="card">
            <div class="card-label">📖 使用说明</div>
            <div class="instr-list">
                <div class="instr-item"><span class="instr-icon">🎭</span><div class="instr-text"><strong>83个动画</strong>：弹跳、淡入淡出、翻转、光速、旋转、缩放、滑动等十大类别，点击卡片即可预览</div></div>
                <div class="instr-item"><span class="instr-icon">👁️</span><div class="instr-text"><strong>实时预览</strong>：点击色块或下方按钮播放动画，支持循环播放</div></div>
                <div class="instr-item"><span class="instr-icon">⚙️</span><div class="instr-text"><strong>核心参数</strong>：可调节持续时间、延迟和重复次数，CSS代码实时更新</div></div>
                <div class="instr-item"><span class="instr-icon">📋</span><div class="instr-text"><strong>一键导出</strong>：支持复制完整CSS、仅关键帧或仅类名，直接用于项目</div></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">✅ 已复制到剪贴板</div>

    <script>
        (function() {
            const animations = [
                // 弹跳
                { name: 'bounceIn', nameCn: '弹入', category: 'bounce', icon: '🏀', keyframes: '0% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1.05); } 70% { transform: scale(0.9); } 100% { transform: scale(1); }' },
                { name: 'bounceInDown', nameCn: '向下弹入', category: 'bounce', icon: '⬇️', keyframes: '0% { opacity: 0; transform: translateY(-1000px); } 60% { opacity: 1; transform: translateY(30px); } 80% { transform: translateY(-10px); } 100% { transform: translateY(0); }' },
                { name: 'bounceInUp', nameCn: '向上弹入', category: 'bounce', icon: '⬆️', keyframes: '0% { opacity: 0; transform: translateY(1000px); } 60% { opacity: 1; transform: translateY(-30px); } 80% { transform: translateY(10px); } 100% { transform: translateY(0); }' },
                { name: 'bounceInLeft', nameCn: '向左弹入', category: 'bounce', icon: '⬅️', keyframes: '0% { opacity: 0; transform: translateX(-1000px); } 60% { opacity: 1; transform: translateX(30px); } 80% { transform: translateX(-10px); } 100% { transform: translateX(0); }' },
                { name: 'bounceInRight', nameCn: '向右弹入', category: 'bounce', icon: '➡️', keyframes: '0% { opacity: 0; transform: translateX(1000px); } 60% { opacity: 1; transform: translateX(-30px); } 80% { transform: translateX(10px); } 100% { transform: translateX(0); }' },

            const allAnimations = animations;

            const animGrid = document.getElementById('animGrid');

            const cssCode = document.getElementById('cssCode');
            const toast = document.getElementById('toast');
            const selectedName = document.getElementById('selectedName');
            const filteredCount = document.getElementById('filteredCount');
            const duration = document.getElementById('duration');
            const durationVal = document.getElementById('durationVal');
            const delay = document.getElementById('delay');
            const delayVal = document.getElementById('delayVal');
            const iteration = document.getElementById('iteration');
            const iterationVal = document.getElementById('iterationVal');

            let currentCategory = 'all';
            let currentAnim = allAnimations[0];
            let isLooping = false;

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(window._tt);
                window._tt = setTimeout(() => toast.classList.remove('show'), 2000);
            }

            async function copyText(text, msg) {
                try { await navigator.clipboard.writeText(text);
                    showToast(msg || '✅ 已复制'); } catch { showToast('❌ 复制失败'); }
            }

            function renderAnimGrid() {
                let filtered = allAnimations;
                if (currentCategory !== 'all') {
                    filtered = filtered.filter(a => a.category === currentCategory);
                }

                animGrid.innerHTML = filtered.map(a => {
                    const active = currentAnim && currentAnim.name === a.name;
                    return `<div class="anim-card ${active ? 'active-card' : ''}" data-name="${a.name}">
                <div class="anim-icon-box">${a.icon}</div>
                <div class="anim-name">${a.nameCn}</div>
              </div>`;
                }).join('');

                filteredCount.textContent = filtered.length;

                animGrid.querySelectorAll('.anim-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const name = card.dataset.name;
                        const anim = allAnimations.find(a => a.name === name);
                        if (anim) {
                            currentAnim = anim;
                            selectedName.textContent = anim.nameCn;
                            renderAnimGrid();
                            stopLoop();
                            playAnimation(false);
                            updateCSS();
                        }
                    });
                });
            }

            function playAnimation(loop = false) {
                stopLoop();
                previewBox.classList.remove('animating');
                void previewBox.offsetWidth;

                const dur = parseFloat(duration.value);
                const del = parseFloat(delay.value);
                const iter = loop ? 'infinite' : parseInt(iteration.value);
                const eas = 'ease';
                const dir = 'normal';
                const fill = 'both';

                let styleEl = document.getElementById('dynKeyframes');
                if (!styleEl) {
                    styleEl = document.createElement('style');
                    styleEl.id = 'dynKeyframes';
                    document.head.appendChild(styleEl);
                }
                styleEl.textContent = `@keyframes ${currentAnim.name} { ${currentAnim.keyframes} }`;

                previewBox.style.animation = `${currentAnim.name} ${dur}s ${eas} ${del}s ${iter} ${dir} ${fill}`;
                previewBox.classList.add('animating');

                if (!loop && iter !== 'infinite') {
                    setTimeout(() => {
                        if (!isLooping) { previewBox.style.animation = '';
                            previewBox.classList.remove('animating'); }
                    }, (dur + del) * iter * 1000 + 200);
                }
                if (loop) isLooping = true;
            }

            function stopLoop() {
                isLooping = false;
                previewBox.style.animation = '';
                previewBox.classList.remove('animating');
            }

            function updateCSS() {
                const kfSimple = `@keyframes ${currentAnim.name} {\n  ${currentAnim.keyframes.replace(/;/g,';\n  ')}\n}`;
                const dur = parseFloat(duration.value);
                const del = parseFloat(delay.value);
                const iter = parseInt(iteration.value);
                const classCSS =
                    `.${currentAnim.name} {\n  animation: ${currentAnim.name} ${dur}s ease ${del}s ${iter} normal both;\n}`;
                cssCode.textContent = kfSimple + '\n\n' + classCSS;
            }

            categoryRow.addEventListener('click', e => {
                if (e.target.classList.contains('category-chip')) {
                    categoryRow.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.category;
                    renderAnimGrid();
                }
            });

            document.getElementById('playBtn').addEventListener('click', () => { stopLoop();
                playAnimation(false); });
            document.getElementById('loopBtn').addEventListener('click', () => { stopLoop();
                playAnimation(true); });
            document.getElementById('stopBtn').addEventListener('click', stopLoop);
            previewBox.addEventListener('click', () => { stopLoop();
                playAnimation(false); });
            previewStage.addEventListener('click', e => { if (e.target === previewStage) { stopLoop();
                    playAnimation(false); } });

            [duration, delay, iteration].forEach(el => {
                el.addEventListener('input', () => {
                    durationVal.textContent = parseFloat(duration.value) + 's';
                    delayVal.textContent = parseFloat(delay.value) + 's';
                    iterationVal.textContent = parseInt(iteration.value);
                    updateCSS();
                });
            });

            document.getElementById('copyFullBtn').addEventListener('click', () => copyText(cssCode.textContent,

            document.getElementById('copyKeyframesBtn').addEventListener('click', () => {

                const del = parseFloat(delay.value);
                const iter = parseInt(iteration.value);
                copyText(`.${currentAnim.name} {\n  animation: ${currentAnim.name} ${dur}s ease ${del}s ${iter} normal both;\n}`,
                    '📝 类名CSS已复制');
            });

            // 初始化
            currentAnim = allAnimations.find(a => a.name === 'bounce') || allAnimations[0];
            selectedName.textContent = currentAnim.nameCn;
            renderAnimGrid();
            updateCSS();
            setTimeout(() => playAnimation(false), 400);
        })();
    </script>
</body>
</html>
