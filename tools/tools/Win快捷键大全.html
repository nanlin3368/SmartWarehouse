<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Win 快捷键大全</title>
  <style>
    :root {
      --bg-primary: #e0e5ec;
      --shadow-light: #ffffff;
      --shadow-dark: #a3b1c6;
      --text-primary: #2c3e50;
      --text-secondary: #5a6c7d;
      --text-muted: #8b9dc3;
      --accent-primary: #667eea;
      --accent-secondary: #764ba2;
      --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --success: #4ecdc4;
      --warning: #f7b731;
      --border-radius: 20px;
      --border-radius-sm: 14px;
      --border-radius-xs: 10px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: pageLoad 0.8s ease;
    }

    @keyframes pageLoad {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 680px;
      text-align: center;
      padding: 28px 24px 22px;
      background: var(--bg-primary);
      border-radius: var(--border-radius);
      box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      animation: headerSlide 0.8s ease 0.2s both;
    }

    header::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: headerShine 4s ease-in-out infinite;
    }

    @keyframes headerSlide {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes headerShine {
      0%   { left: -100%; }
      50%  { left: 100%; }
      100% { left: 100%; }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from { filter: brightness(1); }
      to   { filter: brightness(1.15); }
    }

    .subtitle {
      font-size: 0.92rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ── 主内容 ── */
    .main {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      animation: contentSlide 0.8s ease 0.4s both;
    }

    @keyframes contentSlide {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 通用卡片 ── */
    .card {
      background: var(--bg-primary);
      border-radius: var(--border-radius);
      box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
      padding: 22px 20px;
    }

    .card-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* ── 统计数字区 ── */
    .stats-grid {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-item {
      flex: 1;
      background: var(--bg-primary);
      border-radius: var(--border-radius-xs);
      padding: 12px 8px;
      text-align: center;
      box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
    }

    .stat-number {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 500;
    }

    /* 统计与分类之间的分隔 */
    .stats-divider {
      border: none;
      border-top: 1px solid rgba(163, 177, 198, 0.3);
      margin: 0 0 16px 0;
    }

    /* ── 搜索区域 ── */
    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      z-index: 1;
    }

    .search-input {
      width: 100%;
      padding: 14px 44px 14px 42px;
      border: none;
      border-radius: var(--border-radius-xs);
      background: var(--bg-primary);
      box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--text-primary);
      outline: none;
      transition: var(--transition);
    }

    .search-input::placeholder {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .search-input:focus {
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light),
                  0 0 0 2px rgba(102,126,234,0.15);
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-muted);
      display: none;
      padding: 4px;
      border-radius: 50%;
      transition: var(--transition);
    }

    .search-clear.visible { display: flex; align-items: center; justify-content: center; }
    .search-clear:active { color: var(--accent-primary); }

    /* ── 手风琴分类 ── */
    .categories-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .category-item {
      background: var(--bg-primary);
      border-radius: var(--border-radius-xs);
      box-shadow: 5px 5px 12px var(--shadow-dark), -5px -5px 12px var(--shadow-light);
      overflow: hidden;
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 16px;
      cursor: pointer;
      background: var(--bg-primary);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text-primary);
      user-select: none;
      -webkit-user-select: none;
    }

    .category-header:active {
      background: rgba(102, 126, 234, 0.06);
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .toggle-icon {
      font-size: 0.8rem;
      transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      color: var(--accent-primary);
    }

    .category-count {
      background: var(--bg-primary);
      padding: 3px 10px;
      border-radius: 40px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent-primary);
      box-shadow: inset 1px 1px 2px var(--shadow-dark), inset -1px -1px 2px var(--shadow-light);
    }

    /* ── 内容折叠区（固定高度 + 内部滚动） ── */
    .emojis-container {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.38s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      background: var(--bg-primary);
    }

    .category-item.expanded .emojis-container {
      max-height: 500px;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 10px;
      padding: 14px 16px;
      border-top: 1px solid rgba(163, 177, 198, 0.25);
      max-height: 440px;
      overflow-y: auto;
    }

    /* 自定义滚动条 */
    .emoji-grid::-webkit-scrollbar { width: 4px; }
    .emoji-grid::-webkit-scrollbar-track { background: transparent; }
    .emoji-grid::-webkit-scrollbar-thumb {
      background: var(--shadow-dark);
      border-radius: 4px;
    }

    /* ── 快捷键卡片 ── */
    .emoji-item {
      background: var(--bg-primary);
      border-radius: var(--border-radius-xs);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
      text-align: center;
      padding: 10px 6px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    .emoji-item:active {
      transform: scale(0.92);
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    .emoji-item.fav-item {
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light),
                  0 0 0 2px rgba(247, 183, 49, 0.4);
    }

    .emoji-symbol {
      font-size: 1rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.3;
      word-break: keep-all;
    }

    .emoji-name {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 5px;
      white-space: normal;
      word-break: break-word;
      line-height: 1.3;
    }

    .emoji-fav-dot {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 0.55rem;
      line-height: 1;
    }

    /* ── 最近复制区 ── */
    .recent-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .recent-emoji-item {
      background: var(--bg-primary);
      border-radius: var(--border-radius-xs);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
      text-align: center;
      padding: 10px 8px;
      cursor: pointer;
      transition: var(--transition);
      min-width: 90px;
    }

    .recent-emoji-item:active {
      transform: scale(0.92);
      box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
    }

    .recent-empty {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 10px 0;
    }

    /* ── 无结果 ── */
    .no-result {
      text-align: center;
      padding: 36px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .reset-search-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 18px;
      background: var(--bg-primary);
      border: none;
      border-radius: 30px;
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent-primary);
      cursor: pointer;
    }

    /* ── 操作提示 ── */
    .action-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 14px;
      text-align: center;
      line-height: 1.5;
    }

    /* ── 说明卡片 ── */
    .instr-list { display: flex; flex-direction: column; gap: 8px; }

    .instr-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 12px;
      background: var(--bg-primary);
      border-radius: var(--border-radius-xs);
      box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light);
    }

    .instr-icon { font-size: 1rem; flex-shrink: 0; margin-top: 2px; }
    .instr-text { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5; }
    .instr-text strong { color: var(--text-primary); font-weight: 700; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(44, 62, 80, 0.92);
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 0.82rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 550px) {
      .card { padding: 18px 16px; }
      h1 { font-size: 1.8rem; }
      .emoji-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<header>
  <h1>Win 快捷键大全</h1>
  <p class="subtitle">Win + 办公软件 · 高效工作 · 点击复制</p>
</header>

<div class="main">

    <div class="categories-stack" id="categoriesContainer"></div>
    <div class="action-sub">点击任意快捷键即可复制 · 长按可收藏 ⭐ 常用快捷键</div>
  </div>

  <!-- 最近复制 -->
  <div class="card">
    <div class="card-label">🕐 最近复制</div>
    <div id="recentGrid" class="recent-grid"></div>

  <!-- 使用说明 -->

      </div>
      <div class="instr-item">
        <span class="instr-icon">📋</span>
        <div class="instr-text"><strong>一键复制</strong>：点击任意快捷键卡片即可复制组合键文本，最近 10 条复制记录自动保存</div>
      </div>
      <div class="instr-item">
        <span class="instr-icon">🔒</span>
        <div class="instr-text"><strong>隐私安全</strong>：所有操作及收藏数据本地完成，不联网上传任何数据</div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

      { e: "Ctrl + G", n: "组合对象" }, { e: "Ctrl + Shift + G", n: "取消组合" }, { e: "Alt + F9", n: "显示/隐藏参考线" }, { e: "Ctrl + K", n: "插入超链接" },
      { e: "Ctrl + Shift + D", n: "复制幻灯片" }, { e: "B", n: "放映时黑屏" }, { e: "W", n: "放映时白屏" }, { e: "数字 + Enter", n: "跳转到指定幻灯片" },
      { e: "Ctrl + P", n: "放映时使用画笔" }, { e: "E", n: "擦除画笔痕迹" }, { e: "Home / End", n: "跳至首张/末张幻灯片" }
    ]
  },
  {
    id: "outlook",
    name: "📧 Microsoft Outlook",
    emojis: [
      { e: "Ctrl + N", n: "新建邮件/项目" }, { e: "Ctrl + R", n: "回复邮件" }, { e: "Ctrl + Shift + R", n: "全部回复" }, { e: "Ctrl + F", n: "转发邮件" },
      { e: "Ctrl + Enter", n: "发送邮件" }, { e: "Alt + S", n: "发送（备用）" }, { e: "Ctrl + K", n: "检查姓名" }, { e: "Ctrl + Shift + F", n: "高级查找" },
      { e: "F9", n: "发送/接收所有" }, { e: "Ctrl + Y", n: "转到文件夹" }, { e: "Alt + F1", n: "切换到邮件" }, { e: "Alt + F2", n: "切换到日历" }
    ]
  },
  {
    id: "wps",
    name: "📑 WPS Office 通用",
    emojis: [
      { e: "Ctrl + S", n: "保存文档" }, { e: "Ctrl + P", n: "打印" }, { e: "F12", n: "另存为" }, { e: "Ctrl + F", n: "查找" }, { e: "Ctrl + H", n: "替换" },
      { e: "Ctrl + G", n: "定位" }, { e: "Ctrl + Z / Y", n: "撤销/恢复" }, { e: "Ctrl + X / C / V", n: "剪切/复制/粘贴" }, { e: "Ctrl + B / I / U", n: "粗体/斜体/下划线" },
      { e: "Ctrl + L / E / R", n: "左/中/右对齐" }, { e: "Ctrl + Shift + C", n: "格式刷复制" }, { e: "Ctrl + Shift + V", n: "格式刷粘贴" },
      { e: "Ctrl + Shift + N", n: "新建文档" }, { e: "Ctrl + O", n: "打开文档" }, { e: "Alt + =", n: "公式（表格）" }
    ]
  },
  {
    id: "browser",
    name: "🌐 浏览器办公辅助",
    emojis: [
      { e: "Ctrl + T", n: "新建标签页" }, { e: "Ctrl + W", n: "关闭标签页" }, { e: "Ctrl + Shift + T", n: "恢复关闭的标签页" }, { e: "Ctrl + Tab", n: "切换到下一个标签页" },
      { e: "Ctrl + Shift + Tab", n: "切换到上一个标签页" }, { e: "Ctrl + L / F6", n: "聚焦地址栏" }, { e: "Ctrl + D", n: "收藏当前页" }, { e: "Ctrl + H", n: "历史记录" },
      { e: "Ctrl + J", n: "下载记录" }, { e: "Ctrl + F5", n: "强制刷新" }, { e: "Ctrl + +", n: "放大页面" }, { e: "Ctrl + -", n: "缩小页面" }, { e: "F11", n: "全屏模式" }
    ]
  },
  {
    id: "tools",
    name: "🔧 截图 / 系统工具",
    emojis: [
      { e: "Win + Shift + S", n: "截图工具（矩形/任意/全屏）" }, { e: "PrtSc", n: "截取全屏到剪贴板" }, { e: "Alt + PrtSc", n: "截取当前窗口" },
      { e: "Win + G", n: "打开Xbox游戏栏（录屏）" }, { e: "Win + K", n: "连接无线设备" }, { e: "Win + P", n: "投影/第二屏幕" }, { e: "Win + .", n: "表情符号面板" }
    ]
  }
];

  // ── 状态 ─────────────────────────────────────────────────────
  let currentFilterText = '';
  // 默认收起所有分类，不再自动展开第一个
  let currentExpandedId = null;
  let favorites = JSON.parse(localStorage.getItem('shortcutFavorites') || '[]');
  let recentCopies = JSON.parse(localStorage.getItem('shortcutRecent') || '[]');

  // ── 工具函数 ──────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  async function copyEmoji(emoji, name) {
    try {
      await navigator.clipboard.writeText(emoji);
      showToast('✅ 已复制 ' + emoji + ' ' + name);
      addRecent(emoji, name);
    } catch {
      showToast('❌ 复制失败，请手动复制');
    }
  }

  function isFav(emoji) {
    return favorites.some(f => f.e === emoji);
  }

  function toggleFav(emoji, name) {
    if (isFav(emoji)) {
      favorites = favorites.filter(f => f.e !== emoji);
      showToast('💔 已取消收藏');
    } else {
      favorites.unshift({ e: emoji, n: name });
      showToast('⭐ 已收藏 ' + emoji);
    }
    localStorage.setItem('shortcutFavorites', JSON.stringify(favorites));
    updateStats();
    renderCategories();
  }

  function addRecent(emoji, name) {
    recentCopies = recentCopies.filter(r => r.e !== emoji);
    recentCopies.unshift({ e: emoji, n: name });
    if (recentCopies.length > 10) recentCopies = recentCopies.slice(0, 10);
    localStorage.setItem('shortcutRecent', JSON.stringify(recentCopies));
    renderRecent();
  }

  // ── 长按逻辑 ─────────────────────────────────────────────────
  let longPressTimer = null;

  function attachEmojiEvents(el, emoji, name) {
    // 点击复制
    el.addEventListener('click', e => {
      e.stopPropagation();
      copyEmoji(emoji, name);
    });
    // 长按收藏（移动端）
    el.addEventListener('touchstart', () => {
      longPressTimer = setTimeout(() => {
        longPressTimer = null;
        toggleFav(emoji, name);
      }, 600);
    }, { passive: true });
    el.addEventListener('touchend', () => {
      clearTimeout(longPressTimer);
    });
    el.addEventListener('touchmove', () => {
      clearTimeout(longPressTimer);
    }, { passive: true });
    // 桌面端右键收藏
    el.addEventListener('contextmenu', e => {
      e.preventDefault();
      toggleFav(emoji, name);
    });
  }

  // ── 统计区 ───────────────────────────────────────────────────
  function updateStats() {
    const total = categoriesData.reduce((s, c) => s + c.emojis.length, 0);
    document.getElementById('statsPanel').innerHTML = `
      <div class="stat-item">
        <div class="stat-number">${total}</div>
        <div class="stat-label">⌨️ 快捷键总数</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">${categoriesData.length}</div>
        <div class="stat-label">📂 分类数</div>
      </div>
      <div class="stat-item">
        <div class="stat-number">${favorites.length}</div>
        <div class="stat-label">⭐ 已收藏</div>
      </div>`;
  }

  // ── 搜索 ─────────────────────────────────────────────────────
  function updateSearchClear() {
    document.getElementById('searchClear').classList.toggle('visible', currentFilterText.length > 0);
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    currentFilterText = e.target.value;
    updateSearchClear();
    if (currentFilterText) currentExpandedId = null;
    renderCategories();
  });

  document.getElementById('searchClear').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    currentFilterText = '';
    // 清空搜索后也保持默认收起
    currentExpandedId = null;
    updateSearchClear();
    renderCategories();
  });

  // ── 手风琴渲染 ────────────────────────────────────────────────
  function buildEmojiGrid(emojis) {
    return emojis.map(item => {
      const favMark = isFav(item.e) ? '<span class="emoji-fav-dot">⭐</span>' : '';
      const favClass = isFav(item.e) ? ' fav-item' : '';
      return `<div class="emoji-item${favClass}" data-emoji="${item.e}" data-name="${item.n}">
        ${favMark}
        <div class="emoji-symbol">${item.e}</div>
        <div class="emoji-name">${item.n}</div>
      </div>`;
    }).join('');
  }

  function renderCategories() {
    const filter = currentFilterText.trim().toLowerCase();
    const container = document.getElementById('categoriesContainer');

    // 构建分类列表（收藏置顶）
    let allCats = [];

    if (favorites.length && !filter) {
      allCats.push({ id: '__fav__', name: '⭐ 我的收藏', emojis: favorites, actualCount: favorites.length });
    }

    categoriesData.forEach(cat => {
      let emojis = cat.emojis;
      if (filter) {
        emojis = cat.emojis.filter(item =>
          item.n.includes(filter) ||
          item.e.includes(filter) ||
          cat.name.toLowerCase().includes(filter)
        );
      }
      if (emojis.length) allCats.push({ ...cat, emojis, actualCount: cat.emojis.length });
    });

    if (!allCats.length) {
      container.innerHTML = `
        <div class="no-result">
          😢 没有找到匹配的快捷键<br>
          <button class="reset-search-btn" id="resetSearchBtn">清空搜索</button>
        </div>`;
      document.getElementById('resetSearchBtn')?.addEventListener('click', () => {
        document.getElementById('searchInput').value = '';
        currentFilterText = '';
        currentExpandedId = null;
        updateSearchClear();
        renderCategories();
      });
      return;
    }

    let activeId = filter ? null : currentExpandedId;
    // 仅在 activeId 不为 null 且对应分类不存在时才回退到第一个
    if (!filter && activeId !== null) {
      const activeExists = allCats.some(c => c.id === activeId);
      if (!activeExists) {
        activeId = allCats[0]?.id;
        currentExpandedId = activeId;
      }
    }

    let html = '';
    for (const cat of allCats) {
      const expanded = filter ? true : (activeId === cat.id);
      const countLabel = filter
        ? `${cat.emojis.length}/${cat.actualCount}`
        : cat.emojis.length;
      html += `
        <div class="category-item ${expanded ? 'expanded' : ''}" data-category-id="${cat.id}">
          <div class="category-header">
            <div class="category-title">
              <span class="toggle-icon" style="transform:${expanded ? 'rotate(180deg)' : 'rotate(0deg)'}">▼</span>
              <span>${cat.name}</span>
            </div>
            <span class="category-count">${countLabel}</span>
          </div>
          <div class="emojis-container">
            <div class="emoji-grid">
              ${buildEmojiGrid(cat.emojis)}
            </div>
          </div>
        </div>`;
    }
    container.innerHTML = html;

    // 手风琴互斥点击
    container.querySelectorAll('.category-item').forEach(item => {
      item.querySelector('.category-header')?.addEventListener('click', e => {
        e.stopPropagation();
        if (filter) return;
        const cid = item.dataset.categoryId;
        const isExpanded = item.classList.contains('expanded');
        container.querySelectorAll('.category-item').forEach(other => {
          other.classList.remove('expanded');
          const arr = other.querySelector('.toggle-icon');
          if (arr) arr.style.transform = 'rotate(0deg)';
        });
        if (!isExpanded) {
          item.classList.add('expanded');
          const arr = item.querySelector('.toggle-icon');
          if (arr) arr.style.transform = 'rotate(180deg)';
          currentExpandedId = cid;
        } else {
          currentExpandedId = null;
        }
      });
    });

    // 绑定卡片事件
    container.querySelectorAll('.emoji-item').forEach(el => {
      const emoji = el.dataset.emoji;
      const name = el.dataset.name;
      attachEmojiEvents(el, emoji, name);
    });
  }

  // ── 最近复制渲染 ──────────────────────────────────────────────
  function renderRecent() {
    const el = document.getElementById('recentGrid');
    if (!recentCopies.length) {
      el.innerHTML = '<div class="recent-empty">暂无复制记录</div>';
      return;
    }
    el.innerHTML = recentCopies.map(r => `
      <div class="recent-emoji-item" data-emoji="${r.e}" data-name="${r.n}">
        <div class="emoji-symbol">${r.e}</div>
        <div class="emoji-name">${r.n}</div>
      </div>`).join('');
    el.querySelectorAll('.recent-emoji-item').forEach(el => {
      attachEmojiEvents(el, el.dataset.emoji, el.dataset.name);
    });
  }

  // ── 初始化 ────────────────────────────────────────────────────
  updateStats();
  renderCategories();
  renderRecent();
</script>
</body>
</html>
